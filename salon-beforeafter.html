<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Beauté — ビフォーアフター</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Noto+Sans+JP:wght@300;400&display=swap" rel="stylesheet">
<style>
:root{--cream:#f9f4ef;--blush:#e8c4b0;--rose:#c4856a;--deep:#2c1f1a;--muted:#9a8880;--card:#fff9f5;--shadow:rgba(44,31,26,0.10);--ok:#5cb87a;--warn:#e8a44a;--ng:#d95f5f}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:var(--cream);font-family:'Noto Sans JP',sans-serif;color:var(--deep);min-height:100vh;max-width:430px;margin:0 auto;overflow-x:hidden}
header{background:var(--deep);padding:20px 24px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.logo{font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:300;letter-spacing:0.12em;color:var(--blush)}
.logo span{font-style:italic;color:#fff}
.screen{display:none}
.screen.active{display:block}
.home-hero{background:linear-gradient(160deg,var(--deep) 0%,#4a2e25 100%);padding:28px 24px 24px;color:#fff}
.home-hero h2{font-family:'Cormorant Garamond',serif;font-size:30px;font-weight:300;line-height:1.3;margin-bottom:6px}
.home-hero p{font-size:12px;color:var(--blush);letter-spacing:.08em}
.hero-stats{display:flex;gap:16px;margin-top:20px}
.stat{background:rgba(255,255,255,.08);border-radius:12px;padding:10px 14px;flex:1;border:1px solid rgba(255,255,255,.1)}
.stat-num{font-family:'Cormorant Garamond',serif;font-size:26px;color:var(--blush)}
.stat-label{font-size:10px;color:rgba(255,255,255,.5);letter-spacing:.1em;margin-top:2px}
.section-title{font-size:11px;letter-spacing:.2em;color:var(--muted);padding:18px 24px 10px;text-transform:uppercase}
.client-list{padding:0 16px 100px;display:flex;flex-direction:column;gap:12px}
.client-card{background:var(--card);border-radius:16px;overflow:hidden;box-shadow:0 2px 16px var(--shadow);cursor:pointer;border:1px solid rgba(196,133,106,.1)}
.card-photos{display:grid;grid-template-columns:1fr 1fr;height:130px;position:relative}
.photo-slot{background:#ede7e0;display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative}
.photo-slot:first-child{border-right:1.5px solid #fff}
.photo-slot img{width:100%;height:100%;object-fit:cover}
.photo-label{position:absolute;bottom:6px;left:6px;background:rgba(44,31,26,.65);color:#fff;font-size:9px;letter-spacing:.15em;padding:2px 7px;border-radius:4px}
.photo-empty-icon{font-size:26px;color:var(--blush);opacity:.45}
.divider-arrow{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);background:#fff;border-radius:50%;width:26px;height:26px;display:flex;align-items:center;justify-content:center;font-size:13px;box-shadow:0 2px 8px var(--shadow);z-index:2}
.card-info{padding:12px 14px;display:flex;align-items:center;justify-content:space-between}
.client-name{font-size:15px;font-weight:400;letter-spacing:.04em}
.client-meta{font-size:11px;color:var(--muted);margin-top:2px}
.card-badge{background:var(--blush);color:var(--deep);font-size:10px;padding:3px 9px;border-radius:12px}
.fab{position:fixed;bottom:28px;right:24px;width:56px;height:56px;background:var(--rose);border-radius:50%;border:none;color:#fff;font-size:26px;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 20px rgba(196,133,106,.45);cursor:pointer;z-index:200}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(44,31,26,.6);z-index:300;align-items:flex-end;backdrop-filter:blur(4px)}
.modal-overlay.open{display:flex}
.modal{background:var(--card);border-radius:24px 24px 0 0;padding:24px 24px 40px;width:100%;max-height:92vh;overflow-y:auto}
.modal-handle{width:40px;height:4px;background:#ddd;border-radius:2px;margin:0 auto 18px}
.modal-title{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:300;margin-bottom:18px}
.form-group{margin-bottom:16px}
.form-label{font-size:11px;letter-spacing:.15em;color:var(--muted);text-transform:uppercase;margin-bottom:7px;display:block}
.form-input{width:100%;border:1.5px solid #e8ddd8;border-radius:12px;padding:11px 14px;font-size:15px;font-family:'Noto Sans JP',sans-serif;color:var(--deep);background:#fff;outline:none}
.form-input:focus{border-color:var(--rose)}
textarea.form-input{resize:none;height:72px}
.photo-trigger-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:18px}
.photo-trigger{border:2px dashed #e0d4cc;border-radius:14px;background:#fdf8f5;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;padding:16px 8px;cursor:pointer;aspect-ratio:3/4;position:relative;overflow:hidden}
.photo-trigger img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:none}
.photo-trigger-icon{font-size:28px}
.photo-trigger-label{font-size:11px;letter-spacing:.12em;color:var(--muted)}
.photo-check{position:absolute;top:8px;right:8px;background:var(--ok);border-radius:50%;width:22px;height:22px;display:none;align-items:center;justify-content:center;color:#fff;font-size:12px}
.btn{width:100%;padding:14px;border-radius:14px;border:none;font-size:14px;font-family:'Noto Sans JP',sans-serif;cursor:pointer;margin-bottom:10px}
.btn-primary{background:var(--deep);color:#fff}
.btn-secondary{background:none;border:1.5px solid #e0d4cc;color:var(--muted)}
.btn-sns{width:100%;padding:13px;border-radius:12px;border:none;background:linear-gradient(135deg,var(--deep) 0%,#4a2e25 100%);color:var(--blush);font-size:13px;font-family:'Noto Sans JP',sans-serif;letter-spacing:.1em;cursor:pointer}
.detail-header{background:var(--deep);padding:16px 20px;display:flex;align-items:center;gap:12px}
.back-btn{background:rgba(255,255,255,.12);border:none;color:var(--blush);width:36px;height:36px;border-radius:50%;font-size:18px;display:flex;align-items:center;justify-content:center;cursor:pointer}
.detail-name{font-family:'Cormorant Garamond',serif;font-size:22px;color:#fff;font-weight:300;flex:1}
.detail-dl{background:rgba(232,196,176,.2);border:1px solid rgba(232,196,176,.3);color:var(--blush);border-radius:20px;padding:6px 14px;font-size:12px;font-family:'Noto Sans JP',sans-serif;cursor:pointer}
.compare-labels{display:flex;margin:0 16px;border-radius:12px 12px 0 0;overflow:hidden}
.compare-before{flex:1;text-align:center;padding:7px;font-size:11px;letter-spacing:.2em;text-transform:uppercase;background:var(--deep);color:var(--blush)}
.compare-after{flex:1;text-align:center;padding:7px;font-size:11px;letter-spacing:.2em;text-transform:uppercase;background:var(--rose);color:#fff}
.compare-wrap{margin:0 16px 16px;border-radius:0 0 16px 16px;overflow:hidden}
.side-by-side{display:grid;grid-template-columns:1fr 1fr;height:220px}
.side-img{background:#ede7e0;display:flex;align-items:center;justify-content:center;overflow:hidden}
.side-img img{width:100%;height:100%;object-fit:cover}
.side-img-empty{font-size:32px;opacity:.3}
.detail-info{background:var(--card);margin:0 16px 12px;border-radius:14px;padding:16px;box-shadow:0 2px 12px var(--shadow)}
.info-row{display:flex;gap:10px;align-items:flex-start;margin-bottom:8px}
.info-row:last-child{margin-bottom:0}
.info-icon{font-size:16px;width:22px;flex-shrink:0}
.info-key{font-size:10px;letter-spacing:.15em;color:var(--muted);text-transform:uppercase}
.info-val{font-size:14px;color:var(--deep);margin-top:1px}
.history-list{padding:0 16px 100px;display:flex;flex-direction:column;gap:10px}
.history-item{background:var(--card);border-radius:14px;padding:14px 16px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 1px 8px var(--shadow);cursor:pointer}
.history-date{font-size:13px;color:var(--deep)}
.history-memo{font-size:11px;color:var(--muted);margin-top:2px}
.empty-state{text-align:center;padding:60px 40px;color:var(--muted)}
.empty-icon{font-size:52px;margin-bottom:14px;opacity:.4}
.empty-text{font-size:13px;line-height:1.7}
.ind-row{display:flex;gap:6px;pointer-events:none}
.indicator{background:rgba(30,20,18,.72);border-radius:10px;padding:7px 10px;flex:1;backdrop-filter:blur(6px)}
.ind-label{font-size:9px;letter-spacing:.12em;color:rgba(255,255,255,.6);text-align:center;margin-bottom:4px}
.ind-bar-wrap{height:4px;background:rgba(255,255,255,.15);border-radius:2px;margin-bottom:3px;overflow:hidden}
.ind-bar{height:100%;background:var(--ok);border-radius:2px;transition:width .4s,background .4s}
.ind-val{font-size:9px;color:#fff;text-align:center}
</style>
</head>
<body>

<header>
  <div class="logo">Beau<span>té</span></div>
</header>

<!-- HOME -->
<div id="screen-home" class="screen active">
  <div class="home-hero">
    <h2>ビフォー<br>アフター管理</h2>
    <p>BEAUTY RECORD SYSTEM</p>
    <div class="hero-stats">
      <div class="stat"><div class="stat-num" id="stat-clients">0</div><div class="stat-label">顧客数</div></div>
      <div class="stat"><div class="stat-num" id="stat-records">0</div><div class="stat-label">施術記録</div></div>
    </div>
  </div>
  <div class="section-title">顧客リスト</div>
  <div class="client-list" id="client-list">
    <div class="empty-state"><div class="empty-icon">✦</div><div class="empty-text">右下の「＋」から<br>顧客を登録してください</div></div>
  </div>
</div>

<!-- DETAIL -->
<div id="screen-detail" class="screen">
  <div class="detail-header">
    <button id="back-btn" class="back-btn">‹</button>
    <div class="detail-name" id="detail-name">—</div>
    <button id="dl-btn" class="detail-dl">↓ 保存</button>
  </div>
  <div style="padding:10px 16px 0;display:flex;gap:8px;">
    <button id="sns-btn" class="btn-sns" style="flex:1;">📤 SNS用に1枚合成</button>
    <button id="delete-btn" style="padding:13px 16px;border-radius:12px;border:none;background:#d95f5f;color:#fff;font-size:13px;font-family:'Noto Sans JP',sans-serif;cursor:pointer;flex-shrink:0;">🗑 削除</button>
  </div>
  <br>
  <div class="compare-labels"><div class="compare-before">Before</div><div class="compare-after">After</div></div>
  <div class="compare-wrap">
    <div class="side-by-side">
      <div class="side-img" id="detail-before"><div class="side-img-empty">🌸</div></div>
      <div class="side-img" id="detail-after"><div class="side-img-empty">✨</div></div>
    </div>
  </div>
  <div class="detail-info">
    <div class="info-row"><div class="info-icon">📅</div><div><div class="info-key">施術日</div><div class="info-val" id="detail-date">—</div></div></div>
    <div class="info-row"><div class="info-icon">💬</div><div><div class="info-key">メモ</div><div class="info-val" id="detail-memo">—</div></div></div>
    <div class="info-row"><div class="info-icon">💆</div><div><div class="info-key">施術内容</div><div class="info-val" id="detail-treatment">—</div></div></div>
  </div>
  <div class="section-title">施術履歴</div>
  <div class="history-list" id="history-list"></div>
</div>

<!-- FAB -->
<button class="fab" id="fab-btn">＋</button>

<!-- ADD MODAL -->
<div class="modal-overlay" id="modal-add">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">新規顧客 / 施術記録</div>
    <div class="form-group">
      <label class="form-label">お客様のお名前</label>
      <input class="form-input" type="text" id="input-name" placeholder="例：田中 花子">
    </div>
    <div class="form-group">
      <label class="form-label">施術日</label>
      <input class="form-input" type="date" id="input-date">
    </div>
    <div class="form-group">
      <label class="form-label">施術内容</label>
      <input class="form-input" type="text" id="input-treatment" placeholder="例：フェイシャルエステ">
    </div>
    <div class="form-group">
      <label class="form-label">メモ</label>
      <textarea class="form-input" id="input-memo" placeholder="施術内容の詳細、お客様のご感想など"></textarea>
    </div>
    <div class="form-group">
      <label class="form-label">写真撮影</label>
      <div class="photo-trigger-grid">
        <div class="photo-trigger" id="pt-before">
          <img id="pt-before-img" alt="">
          <div class="photo-trigger-icon" id="pt-before-icon">📷</div>
          <div class="photo-trigger-label" id="pt-before-lbl">BEFORE</div>
          <div class="photo-check" id="pt-before-check">✓</div>
        </div>
        <div class="photo-trigger" id="pt-after">
          <img id="pt-after-img" alt="">
          <div class="photo-trigger-icon" id="pt-after-icon">📷</div>
          <div class="photo-trigger-label" id="pt-after-lbl">AFTER</div>
          <div class="photo-check" id="pt-after-check">✓</div>
        </div>
      </div>
    </div>
    <button class="btn btn-primary" id="save-btn">記録を保存する</button>
    <button class="btn btn-secondary" id="cancel-btn">キャンセル</button>
  </div>
</div>

<!-- SNS MODAL -->
<div class="modal-overlay" id="modal-sns">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">SNS用画像</div>
    <img id="sns-preview" style="width:100%;border-radius:12px;margin-bottom:16px;display:block;" alt="">
    <div style="font-size:12px;color:#9a8880;text-align:center;margin-bottom:16px;">ダウンロード後、写真アプリからSNSに投稿できます</div>
    <button class="btn btn-primary" id="sns-dl-btn">↓ カメラロールに保存</button>
    <button class="btn btn-secondary" id="sns-close-btn">閉じる</button>
  </div>
</div>

<canvas id="main-canvas" style="display:none;"></canvas>

<script>
'use strict';

/* ── データ ── */
var clients = JSON.parse(localStorage.getItem('beaute-clients')||'[]');
var currentClientId = null;
var snsDataUrl = null;
var capturedPhotos = {before:null, after:null};

function persist(){ localStorage.setItem('beaute-clients', JSON.stringify(clients)); }

/* ── 画面切替 ── */
function showScreen(name){
  document.querySelectorAll('.screen').forEach(function(s){ s.classList.remove('active'); });
  document.getElementById('screen-'+name).classList.add('active');
  document.getElementById('fab-btn').style.display = name==='home' ? 'flex' : 'none';
}

/* ── 日付フォーマット ── */
function fmtDate(d){
  if(!d) return '—';
  var p = d.split('-');
  return p[0]+'年'+p[1]+'月'+p[2]+'日';
}

/* ── ホーム描画 ── */
function renderHome(){
  document.getElementById('stat-clients').textContent = clients.length;
  document.getElementById('stat-records').textContent = clients.reduce(function(n,c){ return n+c.records.length; },0);
  var list = document.getElementById('client-list');
  if(!clients.length){
    list.innerHTML = '<div class="empty-state"><div class="empty-icon">✦</div><div class="empty-text">右下の「＋」から<br>顧客を登録してください</div></div>';
    return;
  }
  list.innerHTML = '';
  clients.forEach(function(client){
    var r = client.records[0]||{};
    var card = document.createElement('div');
    card.className = 'client-card';
    var bf = r.before ? '<img src="'+r.before+'" alt=""><span class="photo-label">BEFORE</span>' : '<span class="photo-empty-icon">🌸</span>';
    var af = r.after  ? '<img src="'+r.after+'"  alt=""><span class="photo-label">AFTER</span>'  : '<span class="photo-empty-icon">✨</span>';
    card.innerHTML =
      '<div class="card-photos">'+
        '<div class="photo-slot">'+bf+'</div>'+
        '<div class="divider-arrow">→</div>'+
        '<div class="photo-slot">'+af+'</div>'+
      '</div>'+
      '<div class="card-info">'+
        '<div><div class="client-name">'+client.name+'</div>'+
        '<div class="client-meta">最終：'+(r.date?fmtDate(r.date):'未記録')+' ／ '+client.records.length+'件</div></div>'+
        '<div class="card-badge">'+(r.treatment||'エステ')+'</div>'+
      '</div>';
    (function(id){ card.addEventListener('click', function(){ openDetail(id); }); })(client.id);
    list.appendChild(card);
  });
}

/* ── 詳細画面 ── */
function openDetail(id){
  currentClientId = id;
  var client = clients.filter(function(c){ return c.id===id; })[0];
  document.getElementById('detail-name').textContent = client.name;
  var r = client.records[0];
  var beforeEl = document.getElementById('detail-before');
  var afterEl  = document.getElementById('detail-after');
  if(r){
    beforeEl.innerHTML = r.before ? '<img src="'+r.before+'" alt="">' : '<div class="side-img-empty">🌸</div>';
    afterEl.innerHTML  = r.after  ? '<img src="'+r.after+'"  alt="">' : '<div class="side-img-empty">✨</div>';
    document.getElementById('detail-date').textContent = fmtDate(r.date);
    document.getElementById('detail-memo').textContent = r.memo||'—';
    document.getElementById('detail-treatment').textContent = r.treatment||'—';
  } else {
    beforeEl.innerHTML = '<div class="side-img-empty">🌸</div>';
    afterEl.innerHTML  = '<div class="side-img-empty">✨</div>';
    document.getElementById('detail-date').textContent = '—';
    document.getElementById('detail-memo').textContent = '—';
    document.getElementById('detail-treatment').textContent = '—';
  }
  var hel = document.getElementById('history-list');
  hel.innerHTML = '';
  if(client.records.length){
    client.records.forEach(function(rec,i){
      var item = document.createElement('div');
      item.className = 'history-item';
      item.innerHTML = '<div><div class="history-date">📅 '+(rec.date?fmtDate(rec.date):'日付なし')+'</div>'+
        '<div class="history-memo">'+(rec.treatment||'')+' '+(rec.memo?'・'+rec.memo.slice(0,24):'')+'</div></div>'+
        '<div style="color:var(--blush);font-size:14px">›</div>';
      (function(cid,ri){ item.addEventListener('click', function(){ viewRec(cid,ri); }); })(id,i);
      hel.appendChild(item);
    });
  } else {
    hel.innerHTML = '<div class="empty-state"><div class="empty-text">記録がありません</div></div>';
  }
  showScreen('detail');
}

function viewRec(clientId, recIndex){
  var client = clients.filter(function(c){ return c.id===clientId; })[0];
  var r = client.records[recIndex];
  document.getElementById('detail-before').innerHTML = r.before ? '<img src="'+r.before+'" alt="">' : '<div class="side-img-empty">🌸</div>';
  document.getElementById('detail-after').innerHTML  = r.after  ? '<img src="'+r.after+'"  alt="">' : '<div class="side-img-empty">✨</div>';
  document.getElementById('detail-date').textContent = fmtDate(r.date);
  document.getElementById('detail-memo').textContent = r.memo||'—';
  document.getElementById('detail-treatment').textContent = r.treatment||'—';
}

/* ── 削除 ── */
function deleteClientConfirm(id){
  var client = clients.filter(function(c){ return c.id===id; })[0];
  if(!client) return;
  var overlay = document.createElement('div');
  overlay.style.cssText = 'position:fixed;inset:0;background:rgba(44,31,26,.6);z-index:600;display:flex;align-items:center;justify-content:center;padding:24px;';
  var box = document.createElement('div');
  box.style.cssText = 'background:#fff9f5;border-radius:20px;padding:28px 24px;width:100%;max-width:340px;text-align:center;';
  box.innerHTML = '<div style="font-size:32px;margin-bottom:12px;">🗑</div>'+
    '<div style="font-family:serif;font-size:20px;margin-bottom:8px;">'+client.name+'</div>'+
    '<div style="font-size:13px;color:#9a8880;margin-bottom:24px;line-height:1.6;">この顧客と全施術記録を<br>削除してもよいですか？</div>';
  var btnDel = document.createElement('button');
  btnDel.textContent = '削除する';
  btnDel.style.cssText = 'width:100%;padding:13px;border-radius:12px;border:none;background:#d95f5f;color:#fff;font-size:14px;cursor:pointer;margin-bottom:10px;display:block;';
  var btnCancel = document.createElement('button');
  btnCancel.textContent = 'キャンセル';
  btnCancel.style.cssText = 'width:100%;padding:13px;border-radius:12px;border:1.5px solid #e0d4cc;background:none;color:#9a8880;font-size:14px;cursor:pointer;display:block;';
  btnDel.addEventListener('click', function(){
    clients = clients.filter(function(c){ return c.id!==id; });
    persist(); overlay.remove(); showScreen('home'); renderHome();
  });
  btnCancel.addEventListener('click', function(){ overlay.remove(); });
  box.appendChild(btnDel);
  box.appendChild(btnCancel);
  overlay.appendChild(box);
  document.body.appendChild(overlay);
}

/* ── モーダル ── */
function openAddModal(){
  capturedPhotos = {before:null, after:null};
  document.getElementById('input-name').value='';
  document.getElementById('input-date').value=new Date().toISOString().split('T')[0];
  document.getElementById('input-treatment').value='';
  document.getElementById('input-memo').value='';
  resetPT('before'); resetPT('after');
  document.getElementById('modal-add').classList.add('open');
}
function closeModal(){ document.getElementById('modal-add').classList.remove('open'); }

function resetPT(s){
  document.getElementById('pt-'+s+'-img').style.display='none';
  document.getElementById('pt-'+s+'-img').src='';
  document.getElementById('pt-'+s+'-icon').style.display='';
  document.getElementById('pt-'+s+'-lbl').style.display='';
  document.getElementById('pt-'+s+'-check').style.display='none';
}
function setPT(s,src){
  var img = document.getElementById('pt-'+s+'-img');
  img.src = src; img.style.display='block';
  document.getElementById('pt-'+s+'-icon').style.display='none';
  document.getElementById('pt-'+s+'-lbl').style.display='none';
  document.getElementById('pt-'+s+'-check').style.display='flex';
}

/* ── 保存 ── */
function saveRecord(){
  var name = document.getElementById('input-name').value.trim();
  if(!name){ alert('お名前を入力してください'); return; }
  var rec = {
    date: document.getElementById('input-date').value,
    treatment: document.getElementById('input-treatment').value.trim(),
    memo: document.getElementById('input-memo').value.trim(),
    before: capturedPhotos.before||null,
    after:  capturedPhotos.after||null
  };
  var client = null;
  for(var i=0;i<clients.length;i++){ if(clients[i].name===name){ client=clients[i]; break; } }
  if(client){
    client.records.unshift(rec);
  } else {
    client = {id:Date.now(), name:name, records:[rec]};
    clients.unshift(client);
  }
  persist();
  closeModal();
  renderHome();
  var cid = client.id;
  if(rec.before||rec.after){ setTimeout(function(){ openDetail(cid); },300); }
}

/* ── カメラ ── */
var camStream=null, camSide='before', facingMode='user';
var brightnessTimer=null;

function openCamera(side){
  camSide=side;
  buildCamUI();
}

function buildCamUI(){
  var wrap = document.createElement('div');
  wrap.id='cam-wrap';
  wrap.style.cssText='position:fixed;inset:0;background:#000;z-index:500;';

  var video = document.createElement('video');
  video.id='cam-video';
  video.autoplay=true; video.playsInline=true; video.muted=true;
  video.style.cssText='position:absolute;inset:0;width:100%;height:100%;object-fit:cover;';
  wrap.appendChild(video);

  // グリッド（pointer-events:none）
  var grid = document.createElement('div');
  grid.style.cssText='position:absolute;inset:0;pointer-events:none;z-index:1;';
  grid.innerHTML='<svg viewBox="0 0 100 100" preserveAspectRatio="none" style="width:100%;height:100%;"><line x1="33.3" y1="0" x2="33.3" y2="100" stroke="rgba(255,255,255,.15)" stroke-width=".3"/><line x1="66.6" y1="0" x2="66.6" y2="100" stroke="rgba(255,255,255,.15)" stroke-width=".3"/><line x1="0" y1="33.3" x2="100" y2="33.3" stroke="rgba(255,255,255,.15)" stroke-width=".3"/><line x1="0" y1="66.6" x2="100" y2="66.6" stroke="rgba(255,255,255,.15)" stroke-width=".3"/></svg>';
  wrap.appendChild(grid);

  // 楕円ガイド（pointer-events:none）
  var oval = document.createElement('div');
  oval.style.cssText='position:absolute;left:50%;top:50%;transform:translate(-50%,-54%);width:52%;aspect-ratio:3/4;border:2px solid rgba(255,255,255,.6);border-radius:50%;pointer-events:none;z-index:2;';
  wrap.appendChild(oval);

  // インジケーター（pointer-events:none）
  var indWrap = document.createElement('div');
  indWrap.className='ind-row';
  indWrap.style.cssText='position:absolute;top:100px;left:12px;right:12px;z-index:3;pointer-events:none;';
  indWrap.innerHTML=
    '<div class="indicator"><div class="ind-label">明るさ</div><div class="ind-bar-wrap"><div class="ind-bar" id="bar-brightness" style="width:50%"></div></div><div class="ind-val" id="val-brightness">計測中</div></div>'+
    '<div class="indicator"><div class="ind-label">距離</div><div class="ind-bar-wrap"><div class="ind-bar" id="bar-size" style="width:50%"></div></div><div class="ind-val" id="val-size">—</div></div>'+
    '<div class="indicator"><div class="ind-label">傾き</div><div class="ind-bar-wrap"><div class="ind-bar" id="bar-tilt" style="width:50%"></div></div><div class="ind-val" id="val-tilt">—</div></div>';
  wrap.appendChild(indWrap);

  // 上部HUD（ボタンのみ pointer-events:auto）
  var hudBg = document.createElement('div');
  hudBg.style.cssText='position:absolute;top:0;left:0;right:0;height:100px;background:linear-gradient(to bottom,rgba(0,0,0,.7),transparent);pointer-events:none;z-index:4;';
  wrap.appendChild(hudBg);

  var closeBtn = document.createElement('button');
  closeBtn.textContent='✕';
  closeBtn.style.cssText='position:absolute;top:48px;left:20px;background:rgba(255,255,255,.18);border:none;color:#fff;width:40px;height:40px;border-radius:50%;font-size:18px;cursor:pointer;z-index:5;';
  wrap.appendChild(closeBtn);

  var badge = document.createElement('div');
  badge.style.cssText='position:absolute;top:52px;left:50%;transform:translateX(-50%);background:'+(camSide==='before'?'rgba(44,31,26,.85)':'rgba(196,133,106,.9)')+';border-radius:20px;padding:6px 16px;font-size:12px;letter-spacing:.15em;color:#fff;pointer-events:none;z-index:5;white-space:nowrap;';
  badge.id='cam-badge';
  badge.textContent=camSide==='before'?'BEFORE 撮影':'AFTER 撮影';
  wrap.appendChild(badge);

  var flipBtn = document.createElement('button');
  flipBtn.textContent='🔄';
  flipBtn.style.cssText='position:absolute;top:48px;right:20px;background:rgba(255,255,255,.18);border:none;color:#fff;width:40px;height:40px;border-radius:50%;font-size:18px;cursor:pointer;z-index:5;';
  wrap.appendChild(flipBtn);

  // 下部背景（pointer-events:none）
  var ctrlBg = document.createElement('div');
  ctrlBg.style.cssText='position:absolute;bottom:0;left:0;right:0;height:160px;background:linear-gradient(to top,rgba(0,0,0,.8),transparent);pointer-events:none;z-index:4;';
  wrap.appendChild(ctrlBg);

  // シャッターボタン
  var shutter = document.createElement('button');
  shutter.style.cssText='position:absolute;bottom:52px;left:50%;transform:translateX(-50%);width:76px;height:76px;border-radius:50%;background:#fff;border:4px solid rgba(255,255,255,.5);box-shadow:0 0 0 6px rgba(255,255,255,.2);cursor:pointer;z-index:5;';
  wrap.appendChild(shutter);

  document.body.appendChild(wrap);

  // イベント（addEventListenerのみ使用）
  closeBtn.addEventListener('click', closeCam);
  flipBtn.addEventListener('click', flipCam);
  shutter.addEventListener('click', shootPhoto);

  startStream();
}

function startStream(){
  if(camStream) camStream.getTracks().forEach(function(t){ t.stop(); });
  navigator.mediaDevices.getUserMedia({video:{facingMode:facingMode, width:{ideal:1920}, height:{ideal:1080}}, audio:false})
    .then(function(stream){
      camStream=stream;
      var v=document.getElementById('cam-video');
      if(v) v.srcObject=stream;
      startBrightnessCheck();
    })
    .catch(function(e){ console.warn('camera error',e); });
}

function closeCam(){
  stopCam();
  var wrap=document.getElementById('cam-wrap');
  if(wrap) wrap.remove();
}

function stopCam(){
  if(camStream){ camStream.getTracks().forEach(function(t){ t.stop(); }); camStream=null; }
  stopBrightnessCheck();
}

function flipCam(){
  facingMode = facingMode==='environment'?'user':'environment';
  startStream();
}

function shootPhoto(){
  var v=document.getElementById('cam-video');
  if(!v) return;
  var cv=document.getElementById('main-canvas');
  var cx=cv.getContext('2d');
  var W=v.videoWidth||1280, H=v.videoHeight||720;
  cv.width=W; cv.height=H;
  cx.save();
  if(facingMode==='user'){ cx.translate(W,0); cx.scale(-1,1); }
  cx.drawImage(v,0,0,W,H);
  cx.restore();
  var data=cv.toDataURL('image/jpeg',.92);

  // 自動保存
  var clientName=document.getElementById('input-name').value.trim()||'client';
  var date=new Date().toISOString().slice(0,10);
  autoSave(data, clientName+'_'+date+'_'+camSide+'.jpg');

  capturedPhotos[camSide]=data;
  setPT(camSide,data);

  if(camSide==='before'){
    camSide='after';
    var badge=document.getElementById('cam-badge');
    if(badge){ badge.textContent='AFTER 撮影'; badge.style.background='rgba(196,133,106,.9)'; }
  } else {
    stopCam();
    var wrap=document.getElementById('cam-wrap');
    if(wrap) wrap.remove();
  }
}

function autoSave(dataUrl, filename){
  var a=document.createElement('a');
  a.href=dataUrl; a.download=filename;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
}

function startBrightnessCheck(){
  stopBrightnessCheck();
  brightnessTimer=setInterval(function(){
    var v=document.getElementById('cam-video');
    if(!v||!v.videoWidth) return;
    var cv=document.getElementById('main-canvas');
    var cx=cv.getContext('2d');
    cv.width=80; cv.height=60;
    cx.drawImage(v,0,0,80,60);
    var d=cx.getImageData(0,0,80,60).data;
    var s=0;
    for(var i=0;i<d.length;i+=4) s+=0.299*d[i]+0.587*d[i+1]+0.114*d[i+2];
    var avg=s/(d.length/4);
    var pct=Math.min(100,Math.round(avg/255*100));
    var bar=document.getElementById('bar-brightness');
    var val=document.getElementById('val-brightness');
    if(bar){ bar.style.width=pct+'%'; bar.style.background=avg<55?'var(--ng)':avg<200?'var(--ok)':'var(--warn)'; }
    if(val) val.textContent=avg<55?'暗い':avg<200?'適切✓':'明るすぎ';
  },1000);
}
function stopBrightnessCheck(){ if(brightnessTimer){ clearInterval(brightnessTimer); brightnessTimer=null; } }

/* ── ダウンロード ── */
function downloadLatestPhotos(){
  var client=clients.filter(function(c){ return c.id===currentClientId; })[0];
  if(!client||!client.records.length){ alert('写真がありません'); return; }
  var r=client.records[0];
  if(r.before) autoSave(r.before, client.name+'_before.jpg');
  if(r.after)  autoSave(r.after,  client.name+'_after.jpg');
}

/* ── SNS合成 ── */
function generateSNSImage(){
  var client=clients.filter(function(c){ return c.id===currentClientId; })[0];
  if(!client||!client.records.length){ alert('写真がありません'); return; }
  var r=client.records[0];
  if(!r.before&&!r.after){ alert('写真がありません'); return; }
  var SIZE=1080;
  var cv=document.getElementById('main-canvas');
  cv.width=SIZE; cv.height=SIZE;
  var cx=cv.getContext('2d');
  cx.fillStyle='#2c1f1a'; cx.fillRect(0,0,SIZE,SIZE);

  var clientName=client.name;
  var recDate=fmtDate(r.date);
  var pending=0;

  function finish(){
    // ラベル帯
    cx.fillStyle='rgba(232,196,176,.15)'; cx.fillRect(0,0,SIZE,80);
    cx.fillStyle='#e8c4b0';
    cx.font='300 28px "Cormorant Garamond",serif';
    cx.textAlign='center';
    cx.fillText('Before', 264, 52);
    cx.fillText('After', 816, 52);
    cx.fillStyle='rgba(255,255,255,.3)'; cx.fillRect(536,0,8,SIZE);
    // 下帯
    cx.fillStyle='rgba(0,0,0,.5)'; cx.fillRect(0,SIZE-80,SIZE,80);
    cx.fillStyle='#fff';
    cx.font='300 22px "Noto Sans JP",sans-serif';
    cx.textAlign='left'; cx.fillText(clientName, 32, SIZE-42);
    cx.textAlign='right'; cx.fillText(recDate, SIZE-32, SIZE-42);

    snsDataUrl=cv.toDataURL('image/jpeg',.95);
    document.getElementById('sns-preview').src=snsDataUrl;
    document.getElementById('modal-sns').classList.add('open');
  }

  function drawImg(src, x){
    if(!src){ pending--; if(pending===0) finish(); return; }
    var img=new Image();
    img.onload=function(){
      var s=Math.min(img.width/528,img.height/900);
      var sw=528*s, sh=900*s;
      var sx=(img.width-sw)/2, sy=(img.height-sh)/2;
      cx.drawImage(img,sx,sy,sw,sh,x,90,528,900);
      pending--; if(pending===0) finish();
    };
    img.onerror=function(){ pending--; if(pending===0) finish(); };
    img.src=src;
  }

  pending=2;
  drawImg(r.before, 0);
  drawImg(r.after, 544);
}

/* ── イベント設定 ── */
document.getElementById('fab-btn').addEventListener('click', openAddModal);

document.getElementById('modal-add').addEventListener('click', function(e){
  if(e.target===this) closeModal();
});
document.getElementById('cancel-btn').addEventListener('click', closeModal);
document.getElementById('save-btn').addEventListener('click', saveRecord);

document.getElementById('pt-before').addEventListener('click', function(){ openCamera('before'); });
document.getElementById('pt-after').addEventListener('click',  function(){ openCamera('after');  });

document.getElementById('back-btn').addEventListener('click', function(){ showScreen('home'); });
document.getElementById('dl-btn').addEventListener('click', downloadLatestPhotos);
document.getElementById('sns-btn').addEventListener('click', generateSNSImage);
document.getElementById('delete-btn').addEventListener('click', function(){ deleteClientConfirm(currentClientId); });

document.getElementById('modal-sns').addEventListener('click', function(e){
  if(e.target===this) document.getElementById('modal-sns').classList.remove('open');
});
document.getElementById('sns-close-btn').addEventListener('click', function(){
  document.getElementById('modal-sns').classList.remove('open');
});
document.getElementById('sns-dl-btn').addEventListener('click', function(){
  if(!snsDataUrl) return;
  var client=clients.filter(function(c){ return c.id===currentClientId; })[0];
  autoSave(snsDataUrl, (client?client.name:'client')+'_sns.jpg');
});

/* ── 初期化 ── */
renderHome();
</script>
